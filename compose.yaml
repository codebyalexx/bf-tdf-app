services:
  app:
    build:
      context: .
    image: basicfit-session-lab:local
    restart: unless-stopped
    init: true
    ports:
      - "${HTTP_PORT:-80}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      MAX_SESSIONS: "${MAX_SESSIONS:-6}"
      DEFAULT_SESSION_COUNT: "${DEFAULT_SESSION_COUNT:-1}"
      DEFAULT_COOLDOWN_SECONDS: "${DEFAULT_COOLDOWN_SECONDS:-0}"
      SESSIONS_DIRECTORY: /app/.browser-sessions
    volumes:
      - basicfit_profile:/app/.browser-profile
      - basicfit_sessions:/app/.browser-sessions
    shm_size: "1gb"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/status').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  basicfit_profile:
  basicfit_sessions:
